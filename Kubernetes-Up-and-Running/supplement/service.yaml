# ClusterIP：集群内服务互访（最常用）
apiVersion: v1
kind: Service
metadata:
  name: my-api
  labels:
    app: my-api
spec:
  type: ClusterIP
  selector:
    app: my-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
---
