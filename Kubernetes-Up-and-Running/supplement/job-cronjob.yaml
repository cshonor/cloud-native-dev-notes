apiVersion: batch/v1
kind: Job
metadata:
  name: data-migrate-once
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/your-org/migrate:1.0.0
          command: ["./migrate", "up"]
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-report
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: report
              image: ghcr.io/your-org/report:1.0.0
              command: ["./generate-report"]
