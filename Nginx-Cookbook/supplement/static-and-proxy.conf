server {
    listen 80;
    server_name app.local;
    root /var/www/html;
    index index.html;

    # 静态资源
    location /assets/ {
        expires 7d;
        try_files $uri =404;
    }

    # 动态 API 转发后端
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
